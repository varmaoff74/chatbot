<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAG Assistant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    font-family:Segoe UI, sans-serif;
    background:#f4f7fb;
}

/* Sidebar */

.sidebar{
    width:280px;
    background:#111827;
    color:white;
    display:flex;
    flex-direction:column;
    border-right:1px solid #1f2937;
}

.sidebar-header{
    padding:20px;
    border-bottom:1px solid #374151;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

.sidebar-header h2{
    font-size:20px;
}

.new-chat-btn{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-size:14px;
}

.chat-history{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.chat-item{
    padding:12px;
    border-radius:8px;
    background:#1f2937;
    margin-bottom:10px;
    cursor:pointer;
    transition:.2s;
}

.chat-item:hover,
.chat-item.selected{
    background:#374151;
}

/* Main */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* Upload Area */

.topbar{
    padding:15px;
    background:white;
    border-bottom:1px solid #ddd;
    display:flex;
    gap:15px;
    align-items:center;
    justify-content:space-between;
}

.topbar-title{
    font-size:18px;
    font-weight:700;
    color:#111827;
    white-space:nowrap;
}

.topbar input[type=file]{
    flex:1;
}


/* Messages */

.chat-container{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.message{
    max-width:75%;
    padding:14px;
    margin-bottom:15px;
    border-radius:12px;
    line-height:1.5;
}

.user{
    margin-left:auto;
    background:#dbeafe;
}

.assistant{
    background:white;
    border:1px solid #e5e7eb;
}

/* Input */

.input-section{
    padding:15px;
    background:white;
    border-top:1px solid #ddd;
    display:flex;
    gap:10px;
}

.input-section input{
    flex:1;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    outline:none;
}

.send-btn{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.status{
    padding:10px 20px;
    font-size:14px;
    color:#555;
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

    <div class="sidebar-header">
        <h2>Chat History</h2>
        <button class="new-chat-btn" onclick="newChat()">New Chat</button>
    </div>

    <div class="chat-history" id="chatHistory"></div>

</div>

<!-- Main -->

<div class="main">

    <!-- Upload -->

    <div class="topbar">

        <div class="topbar-title">RAG Assistant</div>

        <input type="file" id="pdfFile">

        <button class="upload-btn" onclick="uploadPDF()">
            Upload PDF
        </button>

    </div>

    <div class="status" id="status">
        Ready
    </div>

    <!-- Messages -->

    <div class="chat-container" id="chatContainer">
    </div>

    <!-- Input -->

    <div class="input-section">

        <input
            type="text"
            id="questionInput"
            placeholder="Ask a question about the uploaded document..."
            onkeydown="if(event.key === 'Enter'){ event.preventDefault(); sendMessage(); }"
        >

        <button class="send-btn" onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

let currentSessionId = null;

async function newChat(){
    currentSessionId = null;
    document.getElementById("chatContainer").innerHTML = "";
    document.getElementById("status").innerText = "New chat started. Upload a PDF to begin.";
    loadSessions();
}

async function uploadPDF(){
    const fileInput = document.getElementById("pdfFile");
    if(!fileInput.files.length){
        alert("Select a PDF first");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    if(currentSessionId){
        formData.append("session_id", currentSessionId);
    }

    document.getElementById("status").innerText = "Uploading...";

    try{
        const response = await fetch("/api/upload/", {
            method: "POST",
            body: formData,
        });
        const data = await response.json();

        if(response.ok){
            currentSessionId = data.session_id;
            document.getElementById("status").innerText = "PDF uploaded successfully.";
            loadSessions();
            loadMessages(currentSessionId);
        } else {
            document.getElementById("status").innerText = data.error || "Upload failed.";
        }
    } catch(error){
        console.error(error);
        document.getElementById("status").innerText = "Upload failed.";
    }
}

async function sendMessage(){
    const input = document.getElementById("questionInput");
    const question = input.value.trim();

    if(!question){
        return;
    }
    if(!currentSessionId){
        alert("Please upload a PDF or select a chat session before asking a question.");
        return;
    }

    addMessage(question, "user");
    input.value = "";

    try{
        const response = await fetch("/api/chat/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                session_id: currentSessionId,
                question: question,
            }),
        });
        const data = await response.json();

        if(response.ok){
            addMessage(data.answer, "assistant");
            loadSessions();
        } else {
            console.error(data);
            alert(data.error || "Chat API error");
        }
    } catch(error){
        console.error(error);
    }
}

function addMessage(text, type){
    const container = document.getElementById("chatContainer");
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.innerText = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

async function loadSessions(){
    try{
        const history = document.getElementById("chatHistory");
        history.innerHTML = "";

        const response = await fetch("/api/sessions/");
        const data = await response.json();

        if(!data.sessions.length){
            const div = document.createElement("div");
            div.className = "chat-item";
            div.innerText = "No previous chats yet. Upload a PDF to get started.";
            history.appendChild(div);
            return;
        }

        data.sessions.forEach(session => {
            const div = document.createElement("div");
            div.className = "chat-item" + (session.session_id === currentSessionId ? " selected" : "");
            const names = (session.document_names && session.document_names.length) ? session.document_names.join(", ") : session.document_name;
            div.innerText = `${names} (${session.session_id.slice(0,8)})`;
            div.onclick = () => loadMessages(session.session_id);
            history.appendChild(div);
        });
    } catch(error){
        console.error(error);
    }
}

async function loadMessages(session_id){
    currentSessionId = session_id;
    try{
        const response = await fetch(`/api/messages/${session_id}/`);
        const data = await response.json();
        const container = document.getElementById("chatContainer");
        container.innerHTML = "";

        (data.history || []).forEach(msg => {
            addMessage(msg.content, msg.role === "user" ? "user" : "assistant");
        });

        const docNames = (data.document_names && data.document_names.length) ? data.document_names.join(", ") : data.document_name || "";
        document.getElementById("status").innerText = `Loaded chat ${session_id.slice(0,8)} ${docNames ? '— ' + docNames : ''}`;
        loadSessions();
    } catch(error){
        console.error(error);
    }
}

loadSessions();

</script>

</body>
</html>
